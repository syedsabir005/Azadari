<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Muharram 2026 Majalis</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header class="site-header">
    <h1>Muharram 2026 Majalis</h1>
    <p>Dallas-Fort Worth Area</p>
  </header>

  <main class="container">

    <section class="form-section">
      <h2>Add Majlis</h2>

      <form id="eventForm">
        <label>Event Name</label>
        <input type="text" id="eventName" value="Annual Majlis" required />

        <label>Venue / Residence</label>
        <input type="text" id="venue" required />

        <label>Date</label>
        <input type="date" id="date" required />

        <label>Time</label>
        <input type="time" id="time" required />

        <label>Speaker</label>
        <input type="text" id="speaker" placeholder="Leave blank if TBA" />

        <label>Address</label>
        <input type="text" id="address" required />

        <label>Host</label>
        <input type="text" id="host" required />

        <label>Phone</label>
        <input type="tel" id="phone" />

        <label>Notes</label>
        <textarea id="notes"></textarea>

        <button type="submit">Add Majlis</button>
      </form>
    </section>

    <section class="events-section">
      <h2>Majalis Schedule</h2>
      <div id="eventsContainer"></div>
    </section>

  </main>

  <script src="js/app.js"></script>
</body>
</html>
