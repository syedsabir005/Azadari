<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DFW Hyderabadi Azadari - Moharram 2026</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header class="site-header">
    <img
      src="assets/logo.jpeg"
      alt="DFW Hyderabadi Azadari"
      class="site-logo"
    />

    <h1>DFW Hyderabadi Azadari</h1>

    <p>
      In House Majalis Schedule for Moharram 2026 - 1448 Hijri
    </p>
  </header>

  <main class="container">

    <section id="nextMajlisSection" class="next-majlis-section"></section>

    <section class="events-section">
      <h2>Majalis Schedule</h2>

      <p class="admin-note">
        For Questions, Updates, Cancellations or New Majlis Entry.
        Please Contact Admin:
        <a
          href="https://wa.me/15717898895?text=Salam%20Sabir%2C%20I%20have%20a%20question%20about%20the%20DFW%20Hyderabadi%20Azadari%20Majalis%20schedule."
          target="_blank"
        >
          571-789-8895
        </a>
      </p>

      <div id="eventsContainer"></div>

      <div class="past-actions">
        <button type="button" id="showPastButton">
          Show Past Majalis
        </button>
      </div>
    </section>

    <section
      id="pastMajalisSection"
      class="events-section"
      style="display: none;"
    >
      <h2>Past Majalis</h2>
      <div id="pastEventsContainer"></div>
    </section>

    <section
      id="loginSection"
      class="form-section"
      style="display: none;"
    >
      <h2>Admin Login</h2>

      <form id="loginForm">
        <label for="loginEmail">Email</label>
        <input
          type="email"
          id="loginEmail"
          required
        />

        <label for="loginPassword">Password</label>
        <input
          type="password"
          id="loginPassword"
          required
        />

        <button type="submit">
          Login
        </button>
      </form>

      <p id="loginError" class="empty-message"></p>
    </section>

    <section
      id="adminPanel"
      style="display: none;"
    >

      <div class="data-actions">
        <button
          type="button"
          id="logoutButton"
        >
          Logout
        </button>
      </div>

      <section class="form-section">
        <h2>Add Majlis</h2>

        <form id="eventForm">

          <label for="eventName">Event Name</label>
          <input
            type="text"
            id="eventName"
            value="Annual Majlis"
            required
          />

          <label for="majlisTitle">Majlis Title</label>
          <input
            type="text"
            id="majlisTitle"
            placeholder="Shahadat e Bibi Sakina (SA), Ashura, 7th Moharram"
          />

          <label for="hijriDate">Hijri Date</label>
          <input
            type="text"
            id="hijriDate"
            placeholder="19 Safar 1448H"
          />

          <label for="venue">Venue / Residence</label>
          <input
            type="text"
            id="venue"
            placeholder="Residence, Hall or Venue Name"
            required
          />

          <label for="date">Date</label>
          <input
            type="date"
            id="date"
            required
          />

          <label for="time">Time</label>
          <input
            type="time"
            id="time"
            required
          />

          <label for="speaker">Speaker</label>
          <input
            type="text"
            id="speaker"
            placeholder="Leave blank if TBA"
          />

          <label for="address">Address</label>
          <input
            type="text"
            id="address"
            placeholder="Full Street Address"
            autocomplete="street-address"
            required
          />

          <label for="host">Host</label>
          <input
            type="text"
            id="host"
            placeholder="Host Name"
            required
          />

          <label for="phone">Phone</label>
          <input
            type="tel"
            id="phone"
            placeholder="(123) 456-7890"
          />

          <label for="notes">Notes</label>
          <textarea
            id="notes"
            placeholder="Optional Notes"
          ></textarea>

          <button type="submit">
            Add Majlis
          </button>

        </form>
      </section>

      <section class="events-section">
        <h2>Admin Schedule Management</h2>

        <p id="majlisCount">
          0 Majalis Scheduled
        </p>

        <input
          type="text"
          id="searchInput"
          class="search-input"
          placeholder="Search by speaker, host, venue, address, or notes"
        />

        <div class="data-actions">
          <button
            type="button"
            id="exportButton"
          >
            Export JSON
          </button>

          <label
            for="importFile"
            class="import-label"
          >
            Import JSON
          </label>

          <input
            type="file"
            id="importFile"
            accept=".json"
            hidden
          />
        </div>

        <div id="adminEventsContainer"></div>
      </section>

    </section>

    <footer class="site-footer">
      <a href="#" id="showAdminLogin">
        Admin Access
      </a>
    </footer>

  </main>

  <script type="module" src="js/app.js"></script>

  <script
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBPbaxKKCslYI2Drjo_SmXEm69klsbX7HI&libraries=places&callback=initAddressAutocomplete"
    async
    defer>
  </script>

</body>
</html>
