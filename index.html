<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DFW Hyderabadi Azadari - Moharram 2026</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header class="site-header">
    <img
      src="assets/logo.jpeg"
      alt="DFW Hyderabadi Azadari"
      class="site-logo"
    />

    <h1>DFW Hyderabadi Azadari</h1>

    <p>
      In House Majalis Schedule for Moharram 2026 - 1448 Hijri
    </p>
  </header>

  <main class="container">

    <section class="form-section">
      <h2>Add Majlis</h2>

      <form id="eventForm">

        <label for="eventName">Event Name</label>
        <input
          type="text"
          id="eventName"
          value="Annual Majlis"
          required
        />

        <label for="venue">Venue / Residence</label>
        <input
          type="text"
          id="venue"
          placeholder="Residence, Hall or Venue Name"
          required
        />

        <label for="date">Date</label>
        <input
          type="date"
          id="date"
          required
        />

        <label for="time">Time</label>
        <input
          type="time"
          id="time"
          required
        />

        <label for="speaker">Speaker</label>
        <input
          type="text"
          id="speaker"
          placeholder="Leave blank if TBA"
        />

        <label for="address">Address</label>
        <input
          type="text"
          id="address"
          placeholder="Full Street Address"
          autocomplete="street-address"
          required
        />

        <label for="host">Host</label>
        <input
          type="text"
          id="host"
          placeholder="Host Name"
          required
        />

        <label for="phone">Phone</label>
        <input
          type="tel"
          id="phone"
          placeholder="(123) 456-7890"
        />

        <label for="notes">Notes</label>
        <textarea
          id="notes"
          placeholder="Optional Notes"
        ></textarea>

        <button type="submit">
          Add Majlis
        </button>

      </form>
    </section>

    <section class="events-section">
      <h2>Majalis Schedule</h2>

      <p id="majlisCount">
        0 Majalis Scheduled
      </p>

      <div id="eventsContainer"></div>
    </section>

  </main>

  <script src="js/app.js"></script>

</body>
</html>
